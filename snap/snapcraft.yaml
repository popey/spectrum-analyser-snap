name: spectrum-analyser
base: core22
adopt-info: spectrum-analyser
summary: Spectrum Analyser
license: MIT
description: |
  Spectrum Analyser is a tool that is designed to help reverse engineer
  ZX Spectrum games & programs.

  It is a combination of an emulator, debugger & interactive disassembler.
  Programs are loaded and run in the emulator and their state can be
  inspected using the tools provided.

  Copy game files (*.z80, *.sna) to ~/snap/spectrum-analyser/current/SpectrumGames

grade: stable
confinement: strict

apps:
  spectrum-analyser:
    command: bin/launch
    extensions: [gnome]
    command-chain:
      - snap/command-chain/alsa-launch
    plugs:
      - audio-playback
      - audio-record
      - home
      - joystick
      - mount-observe
      - network
      - network-bind
      - removable-media

layout:
  /usr/lib/$SNAPCRAFT_ARCH_TRIPLET/alsa-lib:
    bind: $SNAP/usr/lib/$SNAPCRAFT_ARCH_TRIPLET/alsa-lib
  /usr/share/alsa:
    bind: $SNAP/usr/share/alsa

parts:
  alsa-mixin:
    plugin: dump
    source: https://github.com/diddlesnaps/snapcraft-alsa.git
    source-subdir: snapcraft-assets
    build-packages:
      - libasound2-dev
    stage-packages:
      - libasound2
      - libasound2-plugins
      - yad
    stage:
      - etc/asound.conf
      - snap/command-chain/alsa-launch
      - usr/bin/yad*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/alsa-lib
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libasound*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libdnsfile*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libFLAC*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libjack*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libpulse*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libsamplerate*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libspeex*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/libvorbis*
      - usr/lib/$SNAPCRAFT_ARCH_TRIPLET/pulseaudio

  spectrum-analyser:
    after: [alsa-mixin]
    plugin: nil
    source: https://github.com/TheGoodDoktor/8BitAnalysers.git
    source-type: git
    source-submodules:
      - Source/Vendor/chips
      - Source/Vendor/glfw
      - Source/Vendor/imgui
      - Source/Vendor/implot
      - Source/Vendor/json
      - Source/Vendor/luasrc
      - Source/Vendor/stb
      - Source/Vendor/tinydir
      - Source/Vendor/ImGuiColorTextEdit
      - Source/Vendor/magic_enum
      - Source/Vendor/zlib
      - Source/Vendor/imgui_lua_bindings
    build-packages:
      - apt-transport-https
      - build-essential
      - ca-certificates
      - curl
      - gnupg
      - libasound2-dev
      - libegl-mesa0
      - libgl1-mesa-dev
      - libx11-dev
      - libxcursor-dev
      - libxext-dev
      - libxfixes-dev
      - libxi-dev
      - libxinerama-dev
      - libxrandr-dev
      - libxxf86vm-dev
      - software-properties-common
    override-pull: |
      craftctl default
      craftctl set version="$(git describe --tags --always --dirty 2>/dev/null || echo 'unknown')"
    override-build: |
      set -eux

      # core22 ships cmake 3.22 but upstream requires 3.30+. Install from Kitware.
      curl -fsSL https://apt.kitware.com/keys/kitware-archive-latest.asc \
        | gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
      echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main' \
        > /etc/apt/sources.list.d/kitware.list
      apt-get update -qq
      apt-get install -y cmake

      cmake \
        -S Source/ZXSpectrum \
        -B _build \
        -DCMAKE_BUILD_TYPE=Release \
        -DGLFW_BUILD_WAYLAND=OFF \
        -DGLFW_BUILD_DOCS=OFF \
        -DGLFW_INSTALL=OFF

      cmake --build _build -- -j"$(nproc)"

      install -Dm755 _build/bin/SpectrumAnalyser \
        "${CRAFT_PART_INSTALL}/SpectrumAnalyser"

      install -Dm644 Data/SpectrumAnalyser/imgui.ini \
        "${CRAFT_PART_INSTALL}/imgui.ini"
      install -Dm644 Data/SpectrumAnalyser/RomInfo.json \
        "${CRAFT_PART_INSTALL}/RomInfo.json"
      install -Dm644 Data/SpectrumAnalyser/SALogo.png \
        "${CRAFT_PART_INSTALL}/SALogo.png"

      cp -a Data/SpectrumAnalyser/Lua   "${CRAFT_PART_INSTALL}/"
      cp -a Data/SpectrumAnalyser/Fonts "${CRAFT_PART_INSTALL}/"

      install -Dm755 "${CRAFT_PROJECT_DIR}/snap/local/bin/launch" \
        "${CRAFT_PART_INSTALL}/bin/launch"

      install -Dm644 "${CRAFT_PROJECT_DIR}/snap/local/GlobalConfig.json" \
        "${CRAFT_PART_INSTALL}/GlobalConfig.json"
